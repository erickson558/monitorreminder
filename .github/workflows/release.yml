name: release

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Run tests
        shell: pwsh
        run: pytest

      - name: Build executable
        shell: pwsh
        run: .\scripts\build.ps1

      - name: Read version
        id: version
        shell: pwsh
        run: |
          $version = (Get-Content src/monitorreminder/constants.py | Select-String 'APP_VERSION =').ToString().Split('"')[1]
          "version=V$version" >> $env:GITHUB_OUTPUT

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: ${{ steps.version.outputs.version }}
          files: |
            MonitorReminder.exe